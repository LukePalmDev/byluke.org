  <style>
    /* ── Tokens ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper:       #f4f1ea;
      --paper-deep:  #ebe7dc;
      --ink:         #18171a;
      --ink-soft:    #2d2a26;
      --ink-mute:    #5a544c;
      --ink-faint:   #8a857c;
      --rule:        #c9c2b6;
      --rule-soft:   #ddd6c8;
      --rule-strong: #1f1d1c;
      --accent:      #b8281f;
      --accent-tint: #f1d8d3;

      --c-llm:   #1d6e6e;
      --c-mix:   #3a4a8a;
      --c-media: #b04a26;
      --c-slide: #6a3a8a;
      --c-code:  #2a2a2a;
      --c-write: #8a5a14;
      --c-study: #2a5a3a;
      --c-prod:  #5a4a14;
      --c-extra: #7a2a4a;
      --c-try:   #1a4a6a;

      --font-display: "Playfair Display", "Times New Roman", Times, serif;
      --font-serif:   "PT Serif", Georgia, "Times New Roman", serif;
      --font-rubric:  "Oswald", "Arial Narrow", "Helvetica Neue", sans-serif;
      --font-mono:    "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-serif);
      font-size: 1rem;
      line-height: 1.55;
      color: var(--ink);
      background: var(--paper);
      min-height: 100%;
      font-feature-settings: "kern", "liga", "onum";
    }

    a { color: var(--ink); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; }
    a:hover { color: var(--accent); }
    ::selection { background: var(--accent); color: var(--paper); }

    /* ── Page wrap ───────────────────────────────────────────────── */
    .page-wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px 32px 0;
      position: relative;
    }

    .page-wrap[data-grain="1"]::before {
      content: "";
      position: fixed; inset: 0;
      pointer-events: none; z-index: 1; opacity: 0.45;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.08  0 0 0 0 0.08  0 0 0 0 0.08  0 0 0 0.18 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    }
    .page-wrap > * { position: relative; z-index: 2; }

    /* ── Masthead ────────────────────────────────────────────────── */
    .masthead-wrap { padding-top: 8px; }
    .rule-heavy  { border-top: 4px solid var(--rule-strong); }
    .rule-thick  { border-top: 2px solid var(--ink); }
    .rule-double { border-top: 3px double var(--rule-strong); }

    .masthead-meta-top,
    .masthead-meta-bot {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 6px 0; gap: 16px;
    }

    .masthead-wrap .masthead {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(3rem, 7.2vw, 5.4rem);
      line-height: 0.95;
      letter-spacing: -0.025em;
      text-align: center;
      margin: 4px 0 0;
    }
    .masthead-tagline {
      text-align: center;
      font-family: var(--font-serif);
      font-style: italic;
      color: var(--ink-mute);
      font-size: 1.05rem;
      margin: 4px 0 10px;
    }
    .dateline {
      font-family: var(--font-mono);
      font-size: 0.74rem;
      color: var(--ink-faint);
      letter-spacing: 0.02em;
    }

    /* ── Topbar ──────────────────────────────────────────────────── */
    .topbar {
      display: flex; align-items: center; gap: 24px;
      border-bottom: 1px solid var(--rule);
      position: sticky; top: 0; z-index: 20;
      background: var(--paper);
    }

    .tabs {
      flex: 1; display: flex; gap: 0;
      overflow-x: auto; scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      font-family: var(--font-rubric);
      font-size: 0.78rem; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--ink-mute);
      padding: 14px 14px 12px;
      background: none; border: 0;
      border-bottom: 3px solid transparent;
      cursor: pointer; white-space: nowrap;
      display: inline-flex; align-items: center; gap: 8px;
      transition: color 0.15s ease, border-color 0.15s ease;
    }
    .tab:hover { color: var(--ink); }
    .tab.is-active {
      color: var(--ink);
      border-bottom-color: var(--ink);
      font-weight: 700;
    }
    .tab-count {
      font-family: var(--font-mono);
      font-size: 0.65rem; color: var(--ink-faint);
      font-weight: 500; letter-spacing: 0;
    }
    .tab.is-active .tab-count { color: var(--accent); }

    /* ── Search ──────────────────────────────────────────────────── */
    .search {
      display: flex; align-items: center; gap: 10px;
      border: 1px solid var(--ink);
      padding: 8px 12px;
      background: var(--paper);
      width: 280px; flex-shrink: 0;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .search:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-tint);
    }
    .search-icon {
      width: 16px; height: 16px;
      stroke: var(--ink-mute); stroke-width: 1.5; fill: none;
      stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0;
    }
    .search input {
      flex: 1; border: 0; background: transparent; outline: 0;
      font-family: var(--font-serif); font-size: 0.95rem;
      color: var(--ink); min-width: 0;
    }
    .search input::placeholder { color: var(--ink-faint); font-style: italic; }
    .search input::-webkit-search-cancel-button { display: none; }
    .search-shortcut {
      font-family: var(--font-mono);
      font-size: 0.7rem; color: var(--ink-faint);
      border: 1px solid var(--rule); padding: 1px 6px; line-height: 1;
    }
    .search-clear {
      background: transparent; border: 0;
      font-size: 0.85rem; color: var(--ink-mute);
      cursor: pointer; padding: 2px 4px;
      font-family: var(--font-serif);
    }
    .search-clear:hover { color: var(--accent); }

    /* ── Main ────────────────────────────────────────────────────── */
    .main { padding: 32px 0 60px; }

    /* ── Section head ────────────────────────────────────────────── */
    .section-head { margin-bottom: 24px; }
    .section-head .rule-thick  { margin-bottom: 8px; }
    .section-head .rule-double { margin-top: 16px; }

    .rubric {
      font-family: var(--font-rubric);
      font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink-mute);
    }
    .section-head .rubric { margin-bottom: 4px; }

    .section-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(2rem, 4vw, 2.8rem);
      line-height: 1.02; letter-spacing: -0.015em;
      margin: 4px 0 6px;
    }
    .section-lede {
      font-family: var(--font-serif);
      font-style: italic;
      color: var(--ink-soft);
      font-size: 1.1rem; max-width: 640px;
      margin: 0 0 12px;
    }
    .section-meta { display: flex; gap: 18px; align-items: baseline; }

    /* ── Grid ────────────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 14px;
    }

    [data-density="compact"]  .grid { gap: 8px; }
    [data-density="regular"]  .grid { gap: 14px; }
    [data-density="spacious"] .grid { gap: 22px; }

    /* ── Card: POSTER (default) ──────────────────────────────────── */
    .tool {
      position: relative;
      background: var(--paper);
      border: 1px solid var(--ink);
      padding: 18px 12px 14px;
      text-decoration: none; color: var(--ink);
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; min-height: 140px;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
    .tool::before {
      content: "";
      position: absolute; top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--c, var(--ink));
      transition: height 0.15s ease;
    }
    .tool-fav-wrap {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      margin-top: 4px;
    }
    .tool-fav { width: 32px; height: 32px; object-fit: contain; }
    .tool-emoji { font-size: 1.6rem; line-height: 1; }
    .tool-text {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      min-width: 0;
    }
    .tool-name {
      font-family: var(--font-display);
      font-weight: 700; font-size: 1rem;
      text-align: center; line-height: 1.15; letter-spacing: -0.005em;
    }
    .tool-tag {
      font-family: var(--font-rubric);
      font-size: 0.62rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--ink-mute); text-align: center;
    }
    .tool:hover { transform: translateY(-2px); border-color: #000; }
    .tool:hover::before { height: 6px; }
    .tool:active { transform: translateY(0); }
    .tool:focus-visible {
      outline: 0;
      box-shadow: 0 0 0 2px var(--paper), 0 0 0 4px var(--accent);
    }

    [data-density="compact"][data-card="poster"]  .tool { padding: 14px 10px 10px; min-height: 116px; }
    [data-density="spacious"][data-card="poster"] .tool { padding: 22px 14px 18px; min-height: 168px; }

    /* ── Card: CLASSIFIED ────────────────────────────────────────── */
    [data-card="classified"] .tool {
      flex-direction: row; align-items: center;
      justify-content: flex-start; text-align: left;
      padding: 12px 14px 12px 18px; min-height: 0; gap: 14px;
    }
    [data-card="classified"] .tool::before {
      top: 0; bottom: 0; right: auto; left: 0;
      width: 3px; height: auto; transition: width 0.15s ease;
    }
    [data-card="classified"] .tool:hover::before { width: 5px; height: auto; }
    [data-card="classified"] .tool-fav-wrap { margin: 0; width: 32px; height: 32px; flex-shrink: 0; }
    [data-card="classified"] .tool-fav { width: 28px; height: 28px; }
    [data-card="classified"] .tool-text { align-items: flex-start; flex: 1; min-width: 0; gap: 2px; }
    [data-card="classified"] .tool-name {
      font-size: 1rem; text-align: left;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
    }
    [data-card="classified"] .tool-tag { font-size: 0.6rem; text-align: left; }
    [data-card="classified"] .tool:hover { transform: translateX(1px); }

    /* ── Card: MINI ──────────────────────────────────────────────── */
    [data-card="mini"] .tool { padding: 10px 8px; min-height: 84px; gap: 6px; }
    [data-card="mini"] .tool::before { height: 3px; }
    [data-card="mini"] .tool:hover::before { height: 4px; }
    [data-card="mini"] .tool-fav-wrap { width: 28px; height: 28px; margin-top: 0; }
    [data-card="mini"] .tool-fav { width: 24px; height: 24px; }
    [data-card="mini"] .tool-emoji { font-size: 1.2rem; }
    [data-card="mini"] .tool-name { font-size: 0.82rem; }
    [data-card="mini"] .tool-tag { display: none; }

    .empty { padding: 60px 0; text-align: center; color: var(--ink-mute); font-family: var(--font-serif); font-style: italic; }

    /* ── Footer ──────────────────────────────────────────────────── */
    .footer { margin-top: 40px; padding: 18px 0 28px; }
    .footer-row {
      display: flex; justify-content: space-between; align-items: baseline;
      flex-wrap: wrap; gap: 8px; padding-top: 14px;
    }
    .footer-sig { font-family: var(--font-serif); font-style: italic; color: var(--ink-mute); font-size: 0.95rem; }
    .footer-contact { text-decoration: none; }
    .footer-contact:hover { color: var(--accent); }

    /* ── Page transitions ────────────────────────────────────────── */
    .page { display: none; }
    .page.is-active { display: block; animation: fadeIn 0.18s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 760px) {
      .page-wrap { padding: 20px 18px 0; }
      .topbar { flex-wrap: wrap; }
      .search { width: 100%; order: -1; margin: 8px 0; }
      .tabs { width: 100%; }
      .section-title { font-size: 1.8rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important; gap: 10px !important; }
    }
  </style>
</head>

// ── Dateline ──────────────────────────────────────────────────────────────────
(function() {
  const days = ['DOMENICA','LUNEDÌ','MARTEDÌ','MERCOLEDÌ','GIOVEDÌ','VENERDÌ','SABATO'];
  const months = ['GENNAIO','FEBBRAIO','MARZO','APRILE','MAGGIO','GIUGNO',
                  'LUGLIO','AGOSTO','SETTEMBRE','OTTOBRE','NOVEMBRE','DICEMBRE'];
  const now = new Date();
  const d = days[now.getDay()];
  const m = months[now.getMonth()];
  const num = String(now.getDate()).padStart(2,'0');
  const yr = now.getFullYear();
  document.getElementById('dateline-date').textContent =
    'VOL. II · NUM. 138 · ROMA · ' + d + ' ' + num + ' ' + m + ' ' + yr;
})();

// ── Stats ─────────────────────────────────────────────────────────────────────
const totalTools = cats.reduce((n, c) => n + c.tools.length, 0);
document.getElementById('dateline-stats').textContent =
  totalTools + ' TOOL · ' + cats.length + ' CATEGORIE';

// ── Build a tool card element ─────────────────────────────────────────────────
function makeCard(tool, color, catName) {
  let host = '';
  try { host = new URL(tool.url).hostname; } catch(_) {}

  const a = document.createElement('a');
  a.className = 'tool';
  a.href = tool.url;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  a.style.setProperty('--c', color);
  a.title = tool.name;

  const favWrap = document.createElement('div');
  favWrap.className = 'tool-fav-wrap';

  const img = document.createElement('img');
  img.className = 'tool-fav';
  img.src = 'https://www.google.com/s2/favicons?domain=' + host + '&sz=64';
  img.alt = '';
  img.loading = 'lazy';
  img.addEventListener('error', function() {
    favWrap.innerHTML = '<span class="tool-emoji" aria-hidden="true">' + tool.icon + '</span>';
  });
  favWrap.appendChild(img);

  const text = document.createElement('div');
  text.className = 'tool-text';
  text.innerHTML =
    '<span class="tool-name">' + tool.name + '</span>' +
    '<span class="tool-tag">' + (tool.tag || catName) + '</span>';

  a.appendChild(favWrap);
  a.appendChild(text);
  return a;
}

// ── Build section head element ─────────────────────────────────────────────────
function makeSectionHead(cat, index, kicker) {
  const head = document.createElement('div');
  head.className = 'section-head';
  const rub = kicker || ('SEZIONE ' + String(index + 1).padStart(2, '0') + ' · ' + cat.name.toUpperCase());
  head.innerHTML =
    '<div class="rule-thick"></div>' +
    '<div class="rubric" style="color:var(--accent)">' + rub + '</div>' +
    '<h2 class="section-title">' + cat.name + '</h2>' +
    (cat.desc ? '<p class="section-lede">' + cat.desc + '</p>' : '') +
    '<div class="section-meta">' +
      '<span class="rubric">' + cat.count + ' TOOL</span>' +
      '<span class="rubric" style="color:var(--ink-faint)">AGG. 14·05·26</span>' +
    '</div>' +
    '<div class="rule-double"></div>';
  return head;
}

// ── Build category pages ──────────────────────────────────────────────────────
const navEl  = document.getElementById('nav');
const mainEl = document.getElementById('main');

cats.forEach((cat, i) => {
  // Tab
  const btn = document.createElement('button');
  btn.className = 'tab';
  btn.dataset.id = cat.id;
  btn.innerHTML =
    '<span class="tab-name">' + cat.name + '</span>' +
    '<span class="tab-count">' + String(cat.tools.length).padStart(2, '0') + '</span>';
  btn.addEventListener('click', () => show(cat.id));
  navEl.appendChild(btn);

  // Page
  const page = document.createElement('section');
  page.className = 'page';
  page.id = 'p-' + cat.id;

  page.appendChild(makeSectionHead({ ...cat, count: cat.tools.length }, i));

  const grid = document.createElement('div');
  grid.className = 'grid';
  cat.tools.forEach(t => grid.appendChild(makeCard(t, cat.color, cat.name)));
  page.appendChild(grid);

  mainEl.appendChild(page);
});

// Search results page (virtual)
const searchPage = document.createElement('section');
searchPage.className = 'page';
searchPage.id = 'p-search';
mainEl.appendChild(searchPage);

// ── Search ────────────────────────────────────────────────────────────────────
const searchEl    = document.getElementById('search');
const shortcutEl  = document.getElementById('search-shortcut');
const clearBtn    = document.getElementById('search-clear');
let lastActiveId  = cats[0].id;

function renderSearch(query) {
  const q = query.toLowerCase().trim();
  const results = [];
  cats.forEach(cat => {
    cat.tools.forEach(t => {
      if (
        t.name.toLowerCase().includes(q) ||
        (t.tag || '').toLowerCase().includes(q) ||
        cat.name.toLowerCase().includes(q)
      ) {
        results.push({ ...t, _color: cat.color, _cat: cat.name });
      }
    });
  });

  while (searchPage.firstChild) searchPage.removeChild(searchPage.firstChild);

  searchPage.appendChild(makeSectionHead(
    {
      name: 'Risultati per “' + query + '”',
      desc: results.length + ' tool trovati nelle ' + cats.length + ' categorie del catalogo.',
      count: results.length
    },
    0,
    'RICERCA · NEL CATALOGO'
  ));

  if (results.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'Nessun tool trovato.';
    searchPage.appendChild(empty);
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'grid';
  results.forEach(t => grid.appendChild(makeCard(t, t._color, t._cat)));
  searchPage.appendChild(grid);
}

searchEl.addEventListener('input', () => {
  const q = searchEl.value.trim();
  const hasVal = !!searchEl.value;
  shortcutEl.style.display = hasVal ? 'none' : '';
  clearBtn.style.display   = hasVal ? '' : 'none';

  if (!q) { show(lastActiveId); return; }

  renderSearch(q);
  document.querySelectorAll('.page').forEach(p => p.classList.remove('is-active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('is-active'));
  searchPage.classList.add('is-active');
});

clearBtn.addEventListener('click', () => {
  searchEl.value = '';
  searchEl.dispatchEvent(new Event('input'));
  searchEl.focus();
});

document.addEventListener('keydown', e => {
  if (e.key === '/' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
    e.preventDefault();
    searchEl.focus();
  }
  if (e.key === 'Escape' && document.activeElement === searchEl) {
    searchEl.value = '';
    searchEl.dispatchEvent(new Event('input'));
    searchEl.blur();
  }
});

// ── Navigation ────────────────────────────────────────────────────────────────
function show(id) {
  const validId = cats.find(c => c.id === id) ? id : cats[0].id;
  lastActiveId = validId;
  searchEl.value = '';
  shortcutEl.style.display = '';
  clearBtn.style.display   = 'none';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('is-active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('is-active'));
  const page = document.getElementById('p-' + validId);
  const tab  = document.querySelector('[data-id="' + validId + '"]');
  if (page) page.classList.add('is-active');
  if (tab)  tab.classList.add('is-active');
  if (window.location.hash !== '#' + validId) history.pushState(null, '', '#' + validId);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.addEventListener('hashchange', () => {
  if (!searchEl.value.trim()) show(window.location.hash.slice(1));
});

show(window.location.hash.slice(1) || cats[0].id);
