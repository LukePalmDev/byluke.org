  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    /* ── Animated background ── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #f0f4ff;
      min-height: 100vh;
      background: linear-gradient(-45deg, #0d1117, #1a1040, #0d2137, #1a0d2e);
      background-size: 400% 400%;
      animation: bgShift 18s ease infinite;
      will-change: background-position;
      position: relative;
    }

    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Blobs fluidi */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 60%, rgba(139,92,246,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 85% 30%, rgba(59,130,246,0.15) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 50% 80%, rgba(236,72,153,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 55% 45% at 70% 70%, rgba(16,185,129,0.08) 0%, transparent 70%);
      animation: blobsFloat 22s ease-in-out infinite;
      will-change: transform;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes blobsFloat {
      0%, 100% { transform: scale(1) translate(0, 0); }
      33%       { transform: scale(1.06) translate(2%, -2%); }
      66%       { transform: scale(0.95) translate(-2%, 3%); }
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(10, 12, 24, 0.45);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 4px 32px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.25rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      height: 62px;
      position: relative;
      z-index: 1;
    }

    .logo {
      font-size: 1rem;
      font-weight: 700;
      color: #f0f4ff;
      text-decoration: none;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .logo span {
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Nav tabs ── */
    nav {
      display: flex;
      gap: 0.2rem;
      overflow-x: auto;
      scrollbar-width: none;
      flex: 1;
    }
    nav::-webkit-scrollbar { display: none; }

    .tab {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      color: rgba(255,255,255,0.45);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .tab:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.85);
    }
    .tab.active {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-color: rgba(255,255,255,0.18);
      color: #fff;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.2),
        0 2px 12px rgba(0,0,0,0.2);
    }

    .tab-count {
      font-size: 0.62rem;
      opacity: 0.5;
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      padding: 0.05em 0.45em;
      font-weight: 600;
      letter-spacing: 0;
    }
    .tab.active .tab-count { opacity: 0.8; }

    /* ── Search ── */
    #search {
      flex-shrink: 0;
      width: 180px;
      padding: 0.4rem 0.85rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(10px);
      color: #f0f4ff;
      font-size: 0.82rem;
      font-family: inherit;
      outline: none;
      transition: all 0.2s ease;
    }
    #search::placeholder { color: rgba(255,255,255,0.35); }
    #search:focus {
      width: 240px;
      border-color: rgba(167,139,250,0.5);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 3px rgba(167,139,250,0.15);
    }
    #search::-webkit-search-cancel-button { cursor: pointer; }

    /* ── Main ── */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 5rem;
      position: relative;
      z-index: 1;
    }

    .page { display: none; }
    .page.active {
      display: block;
      animation: fadeUp 0.25s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page-header { margin-bottom: 2rem; }
    .page-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.6));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .page-header p {
      font-size: 0.825rem;
      color: rgba(255,255,255,0.4);
      margin-top: 0.35rem;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 0.9rem;
    }

    /* ── Tool card — Liquid Glass ── */
    .tool {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      padding: 1.4rem 0.75rem 1.1rem;
      min-height: 112px;
      border-radius: 1.25rem;
      /* colore come tinta, sfondo visibile in trasparenza */
      background: color-mix(in srgb, var(--c, #334155) 28%, rgba(255,255,255,0.04));
      color: #fff;
      text-decoration: none;
      border: 1px solid color-mix(in srgb, var(--c, #334155) 55%, rgba(255,255,255,0.25));
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      box-shadow:
        0 6px 24px rgba(0,0,0,0.2),
        inset 0 1px 0 rgba(255,255,255,0.22),
        inset 0 -1px 0 rgba(0,0,0,0.12);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      overflow: hidden;
    }

    /* riflesso superiore */
    .tool::before {
      content: '';
      position: absolute;
      top: 0; left: 5%; right: 5%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    }

    .tool:hover {
      transform: translateY(-5px) scale(1.02);
      background: color-mix(in srgb, var(--c, #334155) 42%, rgba(255,255,255,0.06));
      border-color: color-mix(in srgb, var(--c, #334155) 70%, rgba(255,255,255,0.4));
      box-shadow:
        0 16px 40px rgba(0,0,0,0.3),
        0 0 28px color-mix(in srgb, var(--c, #334155) 35%, transparent),
        inset 0 1px 0 rgba(255,255,255,0.3),
        inset 0 -1px 0 rgba(0,0,0,0.15);
    }
    .tool:active { transform: translateY(-2px) scale(1); }

    @supports not (color: color-mix(in srgb, red 50%, blue)) {
      .tool { background: rgba(51,65,85,0.55); border: 1px solid rgba(255,255,255,0.18); }
      .tool:hover { background: rgba(71,85,105,0.7); border-color: rgba(255,255,255,0.3); }
    }

    .t-icon { font-size: 1.75rem; line-height: 1; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3)); }
    .t-favicon { width: 32px; height: 32px; object-fit: contain; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3)); border-radius: 6px; }
    .t-name { font-size: 0.8rem; font-weight: 700; text-align: center; line-height: 1.25; text-shadow: 0 1px 4px rgba(0,0,0,0.4); }
    .t-tag  { font-size: 0.64rem; opacity: 0.55; text-align: center; }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .header-inner { gap: 0.75rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(128px, 1fr)); gap: 0.65rem; }
      .page-header h1 { font-size: 1.25rem; }
      main { padding: 1.5rem 1rem 4rem; }
    }
  </style>
</head>

      { name: 'dots.ocr',        url: 'https://github.com/rednote-hilab/dots.ocr',           icon: '📄', c: '#1f2937', tag: 'GitHub' },
      { name: 'Project Genie',   url: 'https://labs.google/projectgenie',                    icon: '🧪', c: '#9d174d', tag: 'Google Labs' },
      { name: 'dots.mocr',       url: 'https://dotsocr.xiaohongshu.com',                     icon: '🔍', c: '#c2410c', tag: 'OCR' },
      { name: 'AI Scientist',    url: 'https://github.com/SakanaAI/AI-Scientist',            icon: '🔬', c: '#065f46', tag: 'GitHub' },
      { name: 'PaperBanana',     url: 'https://github.com/dwzhu-pku/PaperBanana',           icon: '📝', c: '#92400e', tag: 'GitHub' },
      { name: 'HuggingFace',     url: 'https://huggingface.co/models',                      icon: '🤗', c: '#b45309', tag: 'Models' },
    ]
  },
];

const navEl  = document.getElementById('nav');
const mainEl = document.getElementById('main');

cats.forEach((cat, i) => {
  // Tab
  const btn = document.createElement('button');
  btn.className = 'tab';
  btn.innerHTML = `${cat.icon} ${cat.name} <span class="tab-count">${cat.tools.length}</span>`;
  btn.dataset.id = cat.id;
  btn.addEventListener('click', () => show(cat.id));
  navEl.appendChild(btn);

  // Page
  const page = document.createElement('section');
  page.className = 'page';
  page.id = 'p-' + cat.id;
  page.innerHTML = `
    <div class="page-header">
      <h1>${cat.icon} ${cat.name}</h1>
      <p>${cat.desc}</p>
    </div>
    <div class="grid">
      ${cat.tools.map(t => `
        <a class="tool" href="${t.url}" target="_blank" rel="noopener noreferrer" style="--c:${t.c}" title="${t.name}">
          <img class="t-favicon" src="https://www.google.com/s2/favicons?domain=${new URL(t.url).hostname}&sz=32" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'"><span class="t-icon" style="display:none">${t.icon}</span>
          <span class="t-name">${t.name}</span>
          <span class="t-tag">${t.tag}</span>
        </a>
      `).join('')}
    </div>
  `;
  mainEl.appendChild(page);
});

// Search results page (virtual)
const searchPage = document.createElement('section');
searchPage.className = 'page';
searchPage.id = 'p-search';
mainEl.appendChild(searchPage);

const searchInput = document.getElementById('search');
let lastActiveId = cats[0].id;

function renderSearchResults(query) {
  const q = query.toLowerCase().trim();
  const allTools = cats.flatMap(cat => cat.tools.map(t => ({ ...t, catName: cat.name })));
  const results = allTools.filter(t =>
    t.name.toLowerCase().includes(q) || t.tag.toLowerCase().includes(q) || t.catName.toLowerCase().includes(q)
  );
  searchPage.innerHTML = `
    <div class="page-header">
      <h1>🔍 Risultati per "${query}"</h1>
      <p>${results.length} tool trovati</p>
    </div>
    <div class="grid">
      ${results.map(t => `
        <a class="tool" href="${t.url}" target="_blank" rel="noopener noreferrer" style="--c:${t.c}" title="${t.name}">
          <img class="t-favicon" src="https://www.google.com/s2/favicons?domain=${new URL(t.url).hostname}&sz=32" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'"><span class="t-icon" style="display:none">${t.icon}</span>
          <span class="t-name">${t.name}</span>
          <span class="t-tag">${t.catName}</span>
        </a>
      `).join('')}
    </div>
  `;
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  if (q.length === 0) {
    show(lastActiveId);
    return;
  }
  renderSearchResults(q);
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  searchPage.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

function show(id) {
  const validId = cats.find(c => c.id === id) ? id : cats[0].id;
  lastActiveId = validId;
  searchInput.value = '';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('p-' + validId).classList.add('active');
  document.querySelector(`[data-id="${validId}"]`).classList.add('active');
  if (window.location.hash !== '#' + validId) window.location.hash = validId;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.addEventListener('hashchange', () => {
  const id = window.location.hash.slice(1);
  show(id);
});

// init from URL hash or default to first category
const initId = window.location.hash.slice(1);
show(initId || cats[0].id);
</script>

</body>
</html>
