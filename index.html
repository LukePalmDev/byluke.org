<head>
  <meta charset="UTF-8">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: rgba(255,255,255,0.07);
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #58a6ff;
      --radius: 12px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(13,17,23,0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.25rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      height: 60px;
    }

    .logo {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .logo span { color: var(--accent); }

    /* ── Nav tabs ── */
    nav {
      display: flex;
      gap: 0.15rem;
      overflow-x: auto;
      scrollbar-width: none;
      flex: 1;
    }
    nav::-webkit-scrollbar { display: none; }

    .tab {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.85rem;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
    }
    .tab:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .tab.active { background: rgba(88,166,255,0.12); color: var(--accent); }

    /* ── Main ── */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1.25rem 5rem;
    }

    .page { display: none; }
    .page.active {
      display: block;
      animation: fadeUp 0.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page-header { margin-bottom: 1.75rem; }
    .page-header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.03em; }
    .page-header p  { font-size: 0.825rem; color: var(--muted); margin-top: 0.3rem; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 0.8rem;
    }

    /* ── Tool card (colored button) ── */
    .tool {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1.25rem 0.75rem 1rem;
      min-height: 108px;
      border-radius: var(--radius);
      background: var(--c, #21262d);
      color: rgba(255,255,255,0.95);
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.09);
      transition: transform 0.14s ease, filter 0.14s ease, box-shadow 0.14s ease;
      overflow: hidden;
    }
    .tool::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.14s;
    }
    .tool:hover {
      transform: translateY(-3px);
      filter: brightness(1.15);
      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    }
    .tool:active { transform: translateY(-1px); filter: brightness(0.95); }

    .t-icon { font-size: 1.7rem; line-height: 1; }
    .t-name { font-size: 0.8rem; font-weight: 700; text-align: center; line-height: 1.25; }
    .t-tag  { font-size: 0.65rem; opacity: 0.6; text-align: center; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .header-inner { gap: 0.75rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(128px, 1fr)); gap: 0.6rem; }
      .page-header h1 { font-size: 1.2rem; }
      main { padding: 1.5rem 1rem 4rem; }
    }
  </style>
</head>

const navEl  = document.getElementById('nav');
const mainEl = document.getElementById('main');

cats.forEach((cat, i) => {
  // Tab
  const btn = document.createElement('button');
  btn.className = 'tab' + (i === 0 ? ' active' : '');
  btn.innerHTML = `${cat.icon} ${cat.name}`;
  btn.dataset.id = cat.id;
  btn.addEventListener('click', () => show(cat.id));
  navEl.appendChild(btn);

  // Page
  const page = document.createElement('section');
  page.className = 'page' + (i === 0 ? ' active' : '');
  page.id = 'p-' + cat.id;
  page.innerHTML = `
    <div class="page-header">
      <h1>${cat.icon} ${cat.name}</h1>
      <p>${cat.desc}</p>
    </div>
    <div class="grid">
      ${cat.tools.map(t => `
        <a class="tool" href="${t.url}" target="_blank" rel="noopener noreferrer" style="--c:${t.c}" title="${t.name}">
          <span class="t-icon">${t.icon}</span>
          <span class="t-name">${t.name}</span>
          <span class="t-tag">${t.tag}</span>
        </a>
      `).join('')}
    </div>
  `;
  mainEl.appendChild(page);
});

function show(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('p-' + id).classList.add('active');
  document.querySelector(`[data-id="${id}"]`).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
