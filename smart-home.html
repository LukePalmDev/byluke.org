<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Home Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366f1;
      --secondary: #a78bfa;
      --accent: #ec4899;
      --dark: #0f172a;
      --light: #e0e7ff;
      --text: #f0f9ff;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
      --blur-amount: 20px;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* ANIMATED BACKGROUND */
    body {
      background: linear-gradient(-45deg, #1e293b, #312e81, #1e3a8a, #4f46e5);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      position: relative;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Animated blobs in background */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 20% 50%, rgba(236, 72, 153, 0.2) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(99, 102, 241, 0.2) 0%, transparent 50%),
                  radial-gradient(circle at 40% 40%, rgba(167, 139, 250, 0.15) 0%, transparent 50%);
      animation: float 20s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* MAIN CONTAINER */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* HEADER */
    .header {
      margin-bottom: 2rem;
    }

    .greeting {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--text), var(--light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.6);
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse 2s ease-in-out infinite;
      margin-right: 0.5rem;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* LIQUID GLASS CARD BASE */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--blur-amount));
      -webkit-backdrop-filter: blur(var(--blur-amount));
      border: 1px solid var(--glass-border);
      border-radius: 2rem;
      padding: 1.5rem;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.1),
        inset 0 1px 1px rgba(255, 255, 255, 0.2),
        inset 0 -1px 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent,
        rgba(255, 255, 255, 0.3),
        transparent);
    }

    .glass-card:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
      box-shadow:
        0 16px 48px rgba(0, 0, 0, 0.2),
        inset 0 1px 1px rgba(255, 255, 255, 0.3),
        inset 0 -1px 1px rgba(255, 255, 255, 0.15);
      transform: translateY(-4px);
    }

    /* TEMPERATURE CARD */
    .temp-card {
      grid-column: 1 / -1;
      padding: 2.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: center;
      margin-bottom: 2rem;
    }

    .temp-info h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: rgba(255, 255, 255, 0.8);
    }

    .temp-display {
      font-size: 4rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fbbf24, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .temp-label {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 1.5rem;
    }

    .temp-stats {
      display: flex;
      gap: 2rem;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .stat-label {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .temp-visual {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .temp-circle {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        #3b82f6 0deg,
        #06b6d4 90deg,
        #ec4899 180deg,
        #f59e0b 270deg,
        #3b82f6 360deg
      );
      padding: 3px;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: rotate 8s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .temp-circle::after {
      content: '';
      width: calc(100% - 6px);
      height: calc(100% - 6px);
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(31, 41, 55, 0.8), rgba(15, 23, 42, 0.9));
      backdrop-filter: blur(10px);
    }

    .temp-value-center {
      position: absolute;
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fbbf24, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      z-index: 2;
    }

    /* LIGHTS GRID */
    .lights-section h3 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: rgba(255, 255, 255, 0.8);
    }

    .lights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2rem;
    }

    /* LIGHT CARD */
    .light-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.75rem;
      cursor: pointer;
      position: relative;
      group: 'light';
    }

    .light-icon {
      width: 60px;
      height: 60px;
      border-radius: 1.5rem;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(236, 72, 153, 0.2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      margin-bottom: 1rem;
      transition: all 0.3s ease;
    }

    .light-card.active .light-icon {
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.4), rgba(236, 72, 153, 0.3));
      box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
    }

    .light-name {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      text-align: center;
    }

    .light-toggle {
      width: 48px;
      height: 28px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      position: relative;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      padding: 2px;
    }

    .light-toggle::after {
      content: '';
      width: 24px;
      height: 24px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      transition: all 0.3s ease;
      position: absolute;
      left: 2px;
    }

    .light-card.active .light-toggle {
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.5), rgba(236, 72, 153, 0.4));
      border-color: rgba(251, 191, 36, 0.6);
    }

    .light-card.active .light-toggle::after {
      left: calc(100% - 26px);
      background: #fbbf24;
      box-shadow: 0 0 10px rgba(251, 191, 36, 0.6);
    }

    .light-status {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
    }

    .light-card.active .light-status {
      color: #fbbf24;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }

      .greeting {
        font-size: 1.5rem;
      }

      .temp-card {
        grid-template-columns: 1fr;
        gap: 1.5rem;
        padding: 1.5rem;
      }

      .temp-circle {
        width: 140px;
        height: 140px;
      }

      .temp-display {
        font-size: 3rem;
      }

      .lights-grid {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 1rem;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 0.75rem;
      }

      .greeting {
        font-size: 1.25rem;
      }

      .temp-stats {
        flex-direction: column;
        gap: 1rem;
      }

      .lights-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .light-card {
        padding: 1.25rem 0.75rem;
      }
    }

    /* SCROLL BAR */
    .container::-webkit-scrollbar {
      width: 6px;
    }

    .container::-webkit-scrollbar-track {
      background: transparent;
    }

    .container::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    .container::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HEADER -->
    <div class="header">
      <h1 class="greeting">Benvenuto nella tua Casa</h1>
      <p class="status">
        <span class="status-dot"></span>
        Tutti i dispositivi collegati
      </p>
    </div>

    <!-- TEMPERATURE CARD -->
    <div class="glass-card temp-card">
      <div class="temp-info">
        <h2>Temperatura Casa</h2>
        <div class="temp-display">21°</div>
        <p class="temp-label">Clima controllato</p>
        <div class="temp-stats">
          <div class="stat">
            <div class="stat-value">65%</div>
            <div class="stat-label">Umidità</div>
          </div>
          <div class="stat">
            <div class="stat-value">1013</div>
            <div class="stat-label">Pressione</div>
          </div>
        </div>
      </div>
      <div class="temp-visual">
        <div class="temp-circle">
          <div class="temp-value-center">21°</div>
        </div>
      </div>
    </div>

    <!-- LIGHTS SECTION -->
    <div class="lights-section">
      <h3>Illuminazione</h3>
      <div class="lights-grid">
        <div class="glass-card light-card active" data-room="Salotto">
          <div class="light-icon">💡</div>
          <div class="light-name">Salotto</div>
          <div class="light-toggle"></div>
          <div class="light-status">Acceso</div>
        </div>

        <div class="glass-card light-card" data-room="Camera">
          <div class="light-icon">🌙</div>
          <div class="light-name">Camera</div>
          <div class="light-toggle"></div>
          <div class="light-status">Spento</div>
        </div>

        <div class="glass-card light-card" data-room="Cucina">
          <div class="light-icon">🍳</div>
          <div class="light-name">Cucina</div>
          <div class="light-toggle"></div>
          <div class="light-status">Spento</div>
        </div>

        <div class="glass-card light-card active" data-room="Bagno">
          <div class="light-icon">🚿</div>
          <div class="light-name">Bagno</div>
          <div class="light-toggle"></div>
          <div class="light-status">Acceso</div>
        </div>

        <div class="glass-card light-card" data-room="Studio">
          <div class="light-icon">💻</div>
          <div class="light-name">Studio</div>
          <div class="light-toggle"></div>
          <div class="light-status">Spento</div>
        </div>

        <div class="glass-card light-card active" data-room="Ingresso">
          <div class="light-icon">🚪</div>
          <div class="light-name">Ingresso</div>
          <div class="light-toggle"></div>
          <div class="light-status">Acceso</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Toggle lights on click
    document.querySelectorAll('.light-card').forEach(card => {
      card.addEventListener('click', () => {
        card.classList.toggle('active');
        const status = card.querySelector('.light-status');
        const room = card.dataset.room;

        if (card.classList.contains('active')) {
          status.textContent = 'Acceso';
          console.log(`🔆 ${room} acceso`);
        } else {
          status.textContent = 'Spento';
          console.log(`🌑 ${room} spento`);
        }
      });
    });

    // Update time periodically
    function updateTime() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      console.log(`⏰ ${hours}:${minutes}`);
    }

    setInterval(updateTime, 60000);
    updateTime();
  </script>
</body>
</html>
